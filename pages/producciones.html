<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gestión de Producción Académica</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
  <link rel="stylesheet" href="../css/custom.css">
</head>
<body>

  <header class="navbar navbar-dark sticky-top bg-primary flex-md-nowrap p-2 shadow-sm">
    <a class="navbar-brand col-md-3 col-lg-2 me-0 px-3 fs-6 fw-bold" href="../index.html">U CENFOTEC</a>
    <div class="d-flex align-items-center px-3">
      <label class="text-white me-2 small d-none d-sm-block text-nowrap">Rol Simulado:</label>
      <select id="roleSelector" class="form-select form-select-sm bg-light border-0" style="width: 160px;">
        <option value="Administrador" selected>Administrador</option>
        <option value="Docente">Docente</option>
        <option value="Estudiante">Estudiante</option>
      </select>
    </div>
  </header>

  <div class="container-fluid">
    <div class="row">

      <nav id="sidebarMenu" class="col-md-3 col-lg-2 d-md-block bg-white sidebar collapse border-end p-0">
        <div class="position-sticky pt-3">
          <div class="px-3 mb-2 text-uppercase text-muted fw-bold" style="font-size: 0.75rem;">Principal</div>
          <ul class="nav flex-column mb-4">
            <li class="nav-item">
              <a class="nav-link text-dark py-2 d-flex align-items-center gap-2" href="../index.html">
                <i class="bi bi-speedometer2 text-secondary"></i> Dashboard
              </a>
            </li>
            <li class="nav-item">
              <a class="nav-link active text-primary fw-bold py-2 d-flex align-items-center gap-2" href="producciones.html">
                <i class="bi bi-file-earmark-text"></i> Producción Académica
              </a>
            </li>
          </ul>
          <div class="px-3 mb-2 text-uppercase text-muted fw-bold" style="font-size: 0.75rem;">Mantenimientos</div>
          <ul class="nav flex-column mb-4">
            <li class="nav-item">
              <a class="nav-link text-dark py-2 d-flex align-items-center gap-2" href="mantenimiento.html">
                <i class="bi bi-gear text-secondary"></i> Panel de Catálogos
              </a>
            </li>
          </ul>
        </div>
      </nav>

      <main class="col-md-9 ms-sm-auto col-lg-10 px-md-4 py-4">

        <div class="d-flex justify-content-between flex-wrap flex-md-nowrap align-items-center pt-3 pb-2 mb-3 border-bottom">
          <h1 class="h2">Producción Académica</h1>
          <div data-role-restricted="Administrador,Docente">
            <a href="registro.html" class="btn btn-primary btn-sm d-flex align-items-center gap-1">
              <i class="bi bi-plus-lg"></i> Nueva Producción
            </a>
          </div>
        </div>

        <div class="card p-3 mb-4 shadow-sm">
          <div class="row g-3">
            <div class="col-12 col-md-5">
              <div class="input-group">
                <span class="input-group-text bg-white border-end-0 text-muted"><i class="bi bi-search"></i></span>
                <input type="text" id="inputBuscar" class="form-control border-start-0 ps-0" placeholder="Buscar por título o autor...">
              </div>
            </div>
            <div class="col-12 col-sm-6 col-md-3">
              <select id="selectCategoria" class="form-select">
                <option value="">Todas las categorías</option>
                <option value="Artículo Científico">Artículo Científico</option>
                <option value="Tesis de Grado">Tesis de Grado</option>
                <option value="Proyecto de Investigación">Proyecto de Investigación</option>
                <option value="Manual Técnico">Manual Técnico</option>
              </select>
            </div>
            <div class="col-12 col-sm-6 col-md-3">
              <select id="selectEstado" class="form-select">
                <option value="">Todos los estados</option>
                <option value="Publicado">Publicado</option>
                <option value="En Revisión">En Revisión</option>
              </select>
            </div>
          </div>
        </div>

        <div class="card shadow-sm overflow-hidden">
          <div class="table-responsive">
            <table class="table table-hover align-middle mb-0">
              <thead class="table-light">
                <tr>
                  <th>Título</th>
                  <th>Autor</th>
                  <th>Categoría</th>
                  <th>Fecha</th>
                  <th>Estado</th>
                  <th class="text-end">Acciones</th>
                </tr>
              </thead>
              <tbody id="tablaProducciones"></tbody>
            </table>
          </div>

          <div class="card-footer bg-white d-flex justify-content-between align-items-center py-3 flex-wrap gap-2">
            <span class="text-muted small" id="contadorResultados">Cargando...</span>
            <nav>
              <ul class="pagination pagination-sm mb-0" id="paginacionNav"></ul>
            </nav>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script src="../data/dataDashboard.js"></script>
  <script src="../js/app.js"></script>
  <script src="../js/views/producciones.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
